name: Ingest power flows

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Backfill recent flows
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: entsoe-backfill-flows --days 14 --storage postgres

      - name: Backfill recent transfer capacities
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: entsoe-backfill-capacities --days 14 --storage postgres
